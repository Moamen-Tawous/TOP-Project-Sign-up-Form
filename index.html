<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOP-Sign-up form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="img_section">
      <img
        class="main_img"
        src="/projet-assets/halie-west-25xggax4bSA-unsplash.jpg"
        alt="a beautiful leaf with rain drops with a small lady bug on the top side of it"
      />
      <div class="odin_card">
        <img
          src="/projet-assets/odin-lined (1).png"
          alt="the odin project main logo"
        />
        <p>ODIN</p>
      </div>
      <footer>
        photo by
        <a href="https://unsplash.com/@haliewestphoto">Halie West</a> on
        <a href="https://unsplash.com">Unsplash</a>
      </footer>
    </section>

    <form>
      <h2>
        This is not a real online service! you know you need something like this
        in your life to help you realize your deepest dreams. Sign up
        <span>now</span> to get started.
      </h2>

      <h3>You <span>know</span> you want to.</h3>
      <fieldset>
        <legend>Let's do this!</legend>
        <div class="container">
          <div>
            <label for="first_name">FIRST NAME</label>
            <input type="text" id="first_name" />
          </div>

          <div>
            <label for="last_name">LAST NAME</label>
            <input type="text" id="last_name" />
          </div>

          <div>
            <label for="email">E-MAIL</label>
            <input type="email" id="email" />
          </div>
          <div>
            <label for="phone">PHONE NUMBER</label>
            <input type="text" inputmode="numeric" id="phone" />
          </div>

          <div>
            <label for="passw">PASSWORD</label>
            <input type="password" id="passw" required />
          </div>

          <div>
            <label for="confirm_pass">CONFIRM PASSWORD</label>
            <input type="password" id="confirm_pass" required />
          </div>
        </div>
      </fieldset>

      <div>
        <button type="submit">Create Account</button>
        <p>Already have an account? <a href="#" class="login">Log in</a></p>
      </div>
    </form>
  </body>
</html>
